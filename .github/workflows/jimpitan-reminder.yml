name: Jimpitan Shift Reminder

on:
  schedule:
    # 20:55 WIB = 13:55 UTC
    - cron: '55 13 * * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger jimpitan shift reminder
        env:
          BACKEND_PUBLIC_URL: ${{ secrets.BACKEND_PUBLIC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BACKEND_PUBLIC_URL:-}" ]; then
            echo "BACKEND_PUBLIC_URL secret belum diset" >&2
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "CRON_SECRET secret belum diset" >&2
            exit 1
          fi

          url="${BACKEND_PUBLIC_URL%/}/jimpitan/send-shift-reminder"
          echo "Triggering $url"

          response=$(curl -sS -X POST "$url" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${CRON_SECRET}" )

          echo "Response: $response"

          echo "$response" | grep -q '"success":true' || {
            echo "Reminder trigger gagal" >&2
            exit 1
          }
