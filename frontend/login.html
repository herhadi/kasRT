<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login KasRT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="app-bg">
  <div class="container pt-3 d-flex justify-content-end">
    <button id="themeToggleBtn" class="theme-toggle" type="button" aria-pressed="false"></button>
  </div>
  <main class="container py-4 py-md-5">
    <section class="auth-card mx-auto">
      <p class="pill">KasRT Warga</p>
      <h1 class="auth-title">Masuk ke Sistem Kas RT</h1>
      <p class="auth-subtitle">Gunakan nomor HP dan PIN Anda untuk melihat dashboard kontribusi.</p>

      <form id="loginForm" class="mt-4">
        <div class="mb-3">
          <label for="no_hp" class="form-label fw-semibold">Nomor HP</label>
          <input type="tel" class="form-control form-control-lg" id="no_hp" placeholder="08xxxxxxxxxx" required>
        </div>

        <div class="mb-4">
          <label for="pin" class="form-label fw-semibold">PIN</label>
          <input type="password" class="form-control form-control-lg" id="pin" placeholder="PIN" minlength="4" maxlength="6" required>
        </div>

        <button type="submit" id="btnLogin" class="btn btn-brand btn-lg w-100">Masuk</button>
        <p id="loginMessage" class="small mt-3 mb-0"></p>
      </form>

      <div class="auth-foot mt-4">
        <span>Belum punya akun? Hubungi pengurus RT.</span>
      </div>
    </section>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
